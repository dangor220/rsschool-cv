<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
    <title>rsschool-cv</title>
  </head>
  <body>

    <header class="header">
      <div class="container">
        <div class="header__wrapper" data-scroll-header>
          <div class="header__logo">
            <a class="header__logo-link" href="https://github.com/dangor220" target="_blank">dangor220</a>
          </div>
          <button class="header__hamburger">
            <span class="header__line"></span>
            <span class="header__line"></span>
            <span class="header__line"></span>
          </button>
          <nav class="header__navigation">
            <ul class="header__list">
              <li class="header__item">
                <a data-scroll href="#home" class="header__link header__link-select" data-language="home">Home</a>
              </li>
              <li class="header__item">
                <a data-scroll href="#about" class="header__link" data-language="about">About</a>
              </li>
              <li class="header__item">
                <a data-scroll href="#skills" class="header__link" data-language="skills">Skills</a>
              </li>
              <li class="header__item">
                <a data-scroll href="#portfolio" class="header__link" data-language="portfolio">Potfolio</a>
              </li>
              <li class="header__item">
                <a data-scroll href="#education" class="header__link" data-language="education">Education</a>
              </li>
              <li class="header__item">
                <a data-scroll href="#contact" class="header__link" data-language="contact">Contact</a>
              </li>
            </ul>
          </nav>
          <div class="header__switch">
            <span class="header__switch-lang header__switch-lang_active header__switch-scroll">en</span>
            <span class="header__switch-separator header__switch-scroll">|</span>
            <span class="header__switch-lang header__switch-scroll">ru</span>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="bg">
        <div class="bg__cover"></div>
      </div>

      <div class="logo" id="home">
        <div class="container">
          <div class="overlay">
            <div class="logo__wrapper">
              <div class="logo__author">
                <picture><source srcset="assets/img/logo/author.webp" type="image/webp"><img src="assets/img/logo/author.jpg" alt="author" class="logo__image"></picture>
              </div>
              <h1 class="logo__title" data-language="authorLogo">
                Hi, I'm Danil Gordeev
              </h1>
      
              <div class="logo__subtitle-wrapper">
                <div class="logo__subtitle">Junior</div>
                <div class="logo__subtitle">Front-End</div>
                <div class="logo__subtitle">Developer</div>
              </div>
      
              <a data-scroll href="#about" class="logo__link"><i class="logo__arrow"></i></a>
            </div>
          </div>
        </div>
      </div>


      



    </main>
  
</body>
</html>
